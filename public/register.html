<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — NotifyMQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-box">
            <div class="auth-logo">
                <span class="brand-dot"></span>
                NotifyMQ
            </div>

            <h1 class="auth-title">Create account</h1>
            <p class="auth-sub">Register to receive announcements</p>

            <div class="auth-divider"></div>

            <div class="field-group">
                <label class="field-label" for="username">Username</label>
                <input class="field-input" type="text" id="username" placeholder="At least 3 characters" autocomplete="username">
            </div>
            <div class="field-group">
                <label class="field-label" for="password">Password</label>
                <input class="field-input" type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password">
            </div>
            <div class="field-group">
                <label class="field-label" for="confirm">Confirm Password</label>
                <input class="field-input" type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password">
            </div>

            <button class="btn-send" id="regBtn" onclick="doRegister()">Create Account</button>
            <p id="status" class="status-msg"></p>

            <div class="auth-divider"></div>

            <p class="auth-footer">Already have an account? <a href="/login" class="auth-link">Sign in</a></p>
        </div>
    </div>

    <script>
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") doRegister();
        });

        async function doRegister() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const confirm  = document.getElementById("confirm").value;
            const status   = document.getElementById("status");
            const btn      = document.getElementById("regBtn");

            if (!username || !password || !confirm) {
                status.textContent = "Please fill in all fields.";
                status.style.color = "var(--danger)";
                return;
            }
            if (password !== confirm) {
                status.textContent = "✕ Passwords do not match.";
                status.style.color = "var(--danger)";
                return;
            }

            btn.disabled = true;
            btn.textContent = "Creating account…";
            status.textContent = "";

            try {
                const res  = await fetch("/api/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    status.textContent = "✓ " + data.message;
                    status.style.color = "var(--accent)";
                    setTimeout(() => window.location.href = "/login", 1500);
                } else {
                    status.textContent = "✕ " + data.message;
                    status.style.color = "var(--danger)";
                }
            } catch {
                status.textContent = "✕ Network error.";
                status.style.color = "var(--danger)";
            } finally {
                btn.disabled = false;
                btn.textContent = "Create Account";
            }
        }
    </script>
</body>
</html>
